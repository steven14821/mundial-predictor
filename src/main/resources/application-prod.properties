# ===== SERVIDOR =====
server.port=${PORT:8080}

# ===== BASE DE DATOS (PostgreSQL) =====
# Los valores son inyectados via System.setProperty en main() parseando DATABASE_URL
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Deshabilitar H2 en produccion
spring.h2.console.enabled=false

# ===== FORMATO DE FECHAS =====
spring.mvc.format.date-time=yyyy-MM-dd'T'HH:mm

# ===== CREDENCIALES DE USUARIOS (variables de entorno en Railway) =====
app.admin.username=${ADMIN_USERNAME:admin}
app.admin.password=${ADMIN_PASSWORD:admin123}
app.player1.username=${PLAYER1_USERNAME:jugador1}
app.player1.password=${PLAYER1_PASSWORD:pass123}
app.player2.username=${PLAYER2_USERNAME:jugador2}
app.player2.password=${PLAYER2_PASSWORD:pass123}
app.seed.world-cup.enabled=true

# ===== INTEGRACIONES EXTERNAS =====
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
football-data.api.key=${FOOTBALL_DATA_API_KEY:}
football-data.competition.code=WC
football-data.season=2026
