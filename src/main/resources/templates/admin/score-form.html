<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Cargar resultado')}"></head>
<body>
<nav th:replace="~{layout :: navbar}"></nav>
<main class="container py-4">
    <div class="mb-4">
        <h1 class="h3 mb-1">Registrar resultado</h1>
        <p class="text-secondary mb-0" th:text="${match.homeTeam + ' vs ' + match.awayTeam}">Partido</p>
        <p class="text-secondary mb-0" th:if="${match.matchGroup != null and !#strings.isEmpty(match.matchGroup)}"
           th:text="${'Grupo ' + match.matchGroup}">Grupo A</p>
    </div>

    <div class="card shadow-sm">
        <div class="card-body">
            <form th:action="@{|/admin/matches/${match.id}/score|}" method="post" class="row g-3">
                <div class="col-md-6">
                    <label class="form-label" th:text="${match.homeTeam}">Local</label>
                    <input type="number" min="0" name="homeScore" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label" th:text="${match.awayTeam}">Visitante</label>
                    <input type="number" min="0" name="awayScore" class="form-control" required>
                </div>
                <div class="col-12">
                    <button type="submit" class="btn btn-primary">Guardar resultado</button>
                </div>
            </form>
        </div>
    </div>
</main>
<div th:replace="~{layout :: footer}"></div>
</body>
</html>
