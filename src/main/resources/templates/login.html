<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{layout :: head('Login')}"></head>
<body style="background:var(--m-bg);">
<main class="m-login">

    <div class="m-login-box">
        <div class="m-login-header">
            <h1 class="m-login-title">MUNDIAL 2026</h1>
            <p class="m-login-subtitle">Inicia sesion para ver tus predicciones.</p>
        </div>

        <div th:if="${param.error}" class="m-login-alert m-login-alert--error">
            Usuario o contrasena incorrectos.
        </div>
        <div th:if="${param.logout}" class="m-login-alert m-login-alert--success">
            Sesion cerrada correctamente.
        </div>

        <form th:action="@{/login}" method="post" class="m-login-form">
            <div class="m-login-field">
                <label for="username" class="m-login-label">Usuario</label>
                <input id="username" name="username" type="text" class="m-login-input" required autofocus>
            </div>

            <div class="m-login-field">
                <label for="password" class="m-login-label">Contrasena</label>
                <div class="m-password-wrapper">
                    <input id="password" name="password" type="password" class="m-login-input" required>
                    <button type="button" id="togglePassword" class="m-password-toggle" aria-label="Mostrar contraseña">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="feather feather-eye" viewBox="0 0 24 24" id="eyeIcon">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </button>
                </div>
            </div>

            <button type="submit" class="btn btn-primary w-100">Entrar</button>
        </form>

        <script>
            document.getElementById('togglePassword').addEventListener('click', function () {
                const passwordInput = document.getElementById('password');
                const eyeIcon = document.getElementById('eyeIcon');
                if (passwordInput.type === 'password') {
                    passwordInput.type = 'text';
                    // Change to Eye Off Icon
                    eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
                } else {
                    passwordInput.type = 'password';
                    // Change back to Eye Icon
                    eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
                }
            });
        </script>
    </div>

</main>
<div th:replace="~{layout :: footer}"></div>
</body>
</html>
