<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<!-- ═══════════════════════════════════════════════════════════════
     HEAD FRAGMENT
     ═══════════════════════════════════════════════════════════════ -->
<head th:fragment="head(title)">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="'Mundial 2026 | ' + ${title}">Mundial 2026</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;900&family=Barlow:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- App Styles -->
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<!-- ═══════════════════════════════════════════════════════════════
     NAVBAR FRAGMENT
     ═══════════════════════════════════════════════════════════════ -->
<nav th:fragment="navbar" class="navbar-mundial">
    <!-- Franja tricolor superior -->
    <div class="navbar-mundial__stripe"></div>

    <div class="navbar-mundial__inner">
        <!-- Logo / Brand -->
        <a th:href="@{/dashboard}" class="navbar-brand-mundial">
            <span class="navbar-brand-mundial__icon">&#9917;</span>
            <span class="navbar-brand-mundial__text">
                MUNDIAL <span class="text-accent">26</span>
            </span>
        </a>

        <!-- Navigation -->
        <div class="navbar-mundial__nav">
            <a th:href="@{/matches}" class="nav-link-mundial">Partidos</a>
            <a sec:authorize="hasRole('ADMIN')"
               th:href="@{/admin/matches}"
               class="nav-link-mundial nav-link-mundial--admin">
                Admin
            </a>
            <form th:action="@{/logout}" method="post" class="navbar-mundial__logout">
                <button type="submit" class="btn btn-primary btn-sm">Salir</button>
            </form>
        </div>
    </div>
</nav>

<!-- ═══════════════════════════════════════════════════════════════
     FOOTER FRAGMENT
     ═══════════════════════════════════════════════════════════════ -->
<div th:fragment="footer">
    <footer class="m-footer">
        <p class="m-footer__text">Mundial Predictor 2026</p>
    </footer>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</div>

</html>
