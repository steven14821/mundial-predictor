spring.application.name=MundialPredictorApplication
server.port=8188

# ===== BASE DE DATOS (H2 para desarrollo) =====
spring.datasource.url=jdbc:h2:mem:mundialdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# ===== THYMELEAF =====
spring.thymeleaf.cache=false

# ===== FORMATO DE FECHAS (para datetime-local del HTML) =====
spring.mvc.format.date-time=yyyy-MM-dd'T'HH:mm

# ===== CREDENCIALES (cambiar en produccion con variables de entorno) =====
app.admin.username=admin
app.admin.password=admin123
app.player1.username=Jairo
app.player1.password=jairo123
app.player2.username=Steven
app.player2.password=steven123
app.seed.world-cup.enabled=true

# ===== INTEGRACIONES EXTERNAS =====
gemini.api.key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.0-flash}
football-data.api.key=${FOOTBALL_DATA_API_KEY:}
football-data.competition.code=WC
football-data.season=2026
api-football.api.key=${API_FOOTBALL_KEY:${API_FOOTBALL_API_KEY:}}

